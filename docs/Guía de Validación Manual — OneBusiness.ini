PROBLEMAS CONOCIDOS (no son bugs)

Estos comportamientos son esperados — no reportarlos como bugs:

1. **Reiniciar Docker borra la sesión** — las cookies httpOnly desaparecen al hacer `docker compose down/up`. Hacer login manual. (L-10)

2. **El link "Configurar datos del emisor"** en el formulario de cotización no tiene destino activo. Es deuda técnica DT-05 — pendiente para Sprint 2.5.

3. **Sidebar oculto en mobile** — no hay drawer en pantallas pequeñas. Es deuda técnica conocida.

4. **El selector de negocio para roles no-Dueño** puede hacer múltiples llamadas al cargar. Es deuda técnica DT-06 — pendiente para Sprint 2.4.

5. **Rate limiter se resetea al reiniciar el servidor de dev** — es comportamiento esperado en desarrollo. En producción necesita Redis (D-04).


