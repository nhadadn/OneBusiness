MÓDULO 1 — Autenticación

1.1 Login y sesión
• Ir a `/login`
• Ingresar credenciales incorrectas 5 veces → en el 5to intento aparece mensaje de rate limit ******
• Esperar 15 minutos o reiniciar el servidor de dev → el bloqueo se libera
• Ingresar credenciales correctas → redirige al dashboard ******************
• Verificar que la URL no expone ningún token en la barra de direcciones ********
Nota 1.1: Funciona correctame.

1.2 Persistencia de sesión
• Hacer login → cerrar la pestaña → abrir de nuevo la URL del dashboard ******
• La sesión se mantiene (el refresh token en cookie httpOnly renueva el access token automáticamente)
• Hacer login → esperar más de 15 minutos sin interactuar → hacer cualquier acción **
• La sesión se renueva automáticamente sin pedir login de nuevo
NOTA 1.2: La sesión por seguridad deberia de expirar en 15 minutos de inactividad, 
aunque se renueva automáticamente.

1.3 Logout
• Hacer clic en logout → redirige a `/login` ***********
• Intentar navegar al dashboard manualmente → redirige a `/login` 
• Verificar en DevTools → Application → Cookies: la cookie de refresh token desaparece tras el logout 
NOTA 1.3: Funciona correctamente.


