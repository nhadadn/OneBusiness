Guía de Validación Manual — OneBusiness

Pre-Sprint 2.4 · Estado: 215 tests passed

**Propósito:** Verificar que todo lo implementado hasta Sprint 2.3 funciona correctamente antes de ejecutar la migración histórica de datos.


**Tiempo estimado:** 90-120 minutos para la guía completa. Cada módulo puede validarse de forma independiente.


**Prerequisitos:**
• Docker corriendo (`docker compose up`)
• `npm run dev` activo
• Al menos 1 usuario de cada rol creado en BD (Dueño, Socio, Admin, Externo)
• Al menos 2 negocios creados, con el usuario Dueño con acceso a ambos
• Al menos 1 cuenta bancaria por negocio
• Al menos 1 categoría creada


