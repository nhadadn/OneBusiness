MÓDULO 4 — Importación masiva de movimientos

4.1 Descarga de plantilla
• Ir a `/importar-movimientos`
• Hacer clic en "Descargar plantilla"
• Se descarga `plantilla-movimientos.xlsx`
• Abrir el archivo y verificar que tiene exactamente 3 hojas: **Movimientos**, **Instrucciones**, **Catálogos**
• La hoja **Catálogos** tiene los negocios y cuentas bancarias reales de la BD (no datos de ejemplo)
• La hoja **Movimientos** tiene 3 filas de ejemplo pre-rellenadas
• Intentar acceder a `GET /api/movimientos/plantilla` directamente en el browser sin sesión → redirige a login (no descarga)
NOTA 4.1: Funciona correctamente la descarga de la plantilla. El archivo tiene exactamente 3 hojas: **Movimientos**, **Instrucciones**, **Catálogos**.
La hoja **Catálogos** tiene los negocios y cuentas bancarias reales de la BD (no datos de ejemplo).
La hoja **Movimientos** tiene 3 filas de ejemplo pre-rellenadas.

4.2 Flujo feliz — importación válida
• Completar la plantilla con 5 filas válidas usando nombres exactos de la hoja Catálogos
• Subir el archivo en `/importar-movimientos`
• **Fase Previsualización:** tabla muestra las 5 filas con ✓ verde en columna Estado
• El resumen superior muestra fondo verde: "5 filas listas para importar"
• El botón "Confirmar importación" está visible y activo
• Confirmar → fase Resultado muestra "Se crearon 5 movimientos exitosamente"
• Hacer clic en "Ver movimientos" → los 5 movimientos aparecen en `/movimientos` con estado PENDIENTE
Nota 4.2: El flujo feliz funciona correctamente. Sin embargo, da errores al cargar el tempalte y previsualizar los movimientos.
Hay que reforzar esta cuestion, parece ser un detalle minimo, nos quedamos aun en el punto 4.2 entorno a la validacion de la importacion
y la visualizacion de los movimientos como pendientes de aprobacion.

4.3 Flujo con errores de formato
• Preparar un archivo con estas filas inválidas:
- Una fila con `tipo = TRASPASO` (valor inválido)
- Una fila con `monto = -500` (negativo)
- Una fila con `fecha = 15/01/2026` (formato incorrecto, debe ser YYYY-MM-DD)
• Subir el archivo
• **Fase Previsualización:** las filas inválidas tienen fondo rojo suave y ✗ rojo
• El mensaje de error aparece debajo de la celda con el problema
• El resumen superior muestra fondo amber: "X filas con error"
• El botón "Confirmar importación" NO aparece
• Solo aparece el botón "Corregir archivo"
• Hacer clic en "Corregir archivo" → vuelve a la fase de subir, limpia el archivo
NOTA 4.3: Dependencia del punto 4.2. El flujo con errores de formato depende de la previsualizacion correcta del archivo 
en la fase Previsualizacion.


4.4 Flujo con errores del servidor
• Preparar un archivo con una fila donde `negocio = "NEGOCIO QUE NO EXISTE"`
• Subir el archivo → la previsualización del cliente no detecta este error (solo valida formato)
• El botón "Confirmar importación" aparece (el cliente no sabe que el negocio no existe)
• Confirmar → el servidor retorna 400
• La página se queda en Previsualización (no avanza a Resultado)
• Aparece un banner de error con el mensaje del servidor
• El error específico de la fila es visible sobre la tabla
NOTA 4.4: Dependencia del punto 4.2. El flujo con errores de formato depende de la previsualizacion correcta del archivo 
en la fase Previsualizacion.


4.5 Límite de filas
• Preparar un archivo con 201 filas de datos (más del límite de 200)
• Subir y confirmar → el servidor retorna 400 con mensaje sobre el límite
• 0 movimientos creados en BD
NOTA 4.5: Dependencia del punto 4.2. El flujo con errores de formato depende de la previsualizacion correcta del archivo 
en la fase Previsualizacion.


