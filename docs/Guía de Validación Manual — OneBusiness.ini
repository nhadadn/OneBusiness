MÓDULO 5 — Cotizaciones

5.1 Lista de cotizaciones (`/cotizaciones`)
• El ítem "Cotizaciones" aparece en el Sidebar para todos los roles
• La página carga correctamente con tabla, filtros y paginación
• Los filtros funcionan: estado, período, negocio, búsqueda con debounce
• Cambiar cualquier filtro resetea a página 1
• Las filas de la tabla son clickeables y navegan al detalle


5.2 Crear cotización
• Ir a `/cotizaciones/nueva`
• Seleccionar un negocio con datos del emisor configurados (rfc, dirección, teléfono)
- [ ] Aparece bloque **verde**: "Datos del emisor completos" con RFC, dirección y teléfono
• Seleccionar un negocio sin datos del emisor configurados
- [ ] Aparece bloque **amber**: "Datos del emisor incompletos" con los campos faltantes listados

• Cambiar de negocio → el bloque del emisor se actualiza, las categorías se recargan
• Agregar 3 líneas de ítems:
- Línea 1: solo descripción e importe (sin cantidad ni precio unitario)
- Línea 2: cantidad + precio unitario → verificar que importe se calcula automáticamente
- Línea 3: solo precio unitario (sin cantidad) → verificar que importe = precio unitario
• Los totales (subtotal, IVA 16%, total) se actualizan en tiempo real al cambiar importes
• Intentar eliminar la única línea → el botón × está deshabilitado
• Intentar guardar sin cliente nombre → error de validación visible en el campo
• Guardar como borrador → navega a `/cotizaciones`, la cotización aparece con folio `COT-YYYY-001` y estado BORRADOR
• Crear otra cotización → folio `COT-YYYY-002` (correlativo)


5.3 Flujo completo de estados

Usar una cotización recién creada en estado BORRADOR:


**BORRADOR → ENVIADA:**
• En la lista, abrir dropdown de la cotización → hacer clic en "Enviar"
• Dialog de confirmación aparece con el folio y nombre del cliente
• Confirmar → estado cambia a ENVIADA, badge actualizado en la tabla
• Toast de éxito visible


**ENVIADA → APROBADA:**
• Abrir dropdown de la cotización ENVIADA → "Aprobar"
• Dialog pide número de OC
• Intentar confirmar sin número de OC → botón deshabilitado
• Ingresar número de OC (ej: `OC-2026-001`) → confirmar
• Estado cambia a APROBADA, badge actualizado


**APROBADA → FACTURADA:**
• Abrir dropdown de la cotización APROBADA → "Facturar"
• Dialog muestra el total de la cotización en el texto informativo
• El selector de cuenta bancaria carga las cuentas del negocio
• El selector de categoría carga las categorías disponibles (opcional)
• Intentar confirmar sin número de factura → botón deshabilitado
• Intentar confirmar sin cuenta bancaria → botón deshabilitado
• Completar todos los campos → confirmar
• Estado cambia a FACTURADA
• Toast: "Factura registrada. Se creó un movimiento de ingreso pendiente."
• El badge de pendientes en el Sidebar se incrementa
• Ir a `/movimientos` → aparece un movimiento INGRESO PENDIENTE con:
- Monto = total de la cotización
- Concepto = "Cotización COT-XXXX-NNN - [nombre cliente]"
- Estado = PENDIENTE


**Cancelar:**
• Crear una cotización nueva en BORRADOR
• Intentar cancelarla → Dialog de confirmación con advertencia
• Confirmar → estado CANCELADA, badge rojo en la tabla
• Verificar que una cotización FACTURADA NO puede cancelarse directamente
(el dropdown no muestra "Cancelar" o muestra error al intentarlo)


5.4 Editar cotización
• Abrir dropdown de una cotización BORRADOR → "Editar"
• El formulario pre-carga todos los datos correctamente (negocio, cliente, ítems, totales)
• Modificar el importe de una línea → los totales se recalculan
• Guardar → navega a `/cotizaciones`, los cambios son visibles
• Intentar navegar a `/cotizaciones/:id/editar` de una cotización FACTURADA
→ redirige al detalle (no permite editar)


5.5 Vista de detalle (`/cotizaciones/:id`)
• Hacer clic en una fila de la lista → navega al detalle
• Layout de dos columnas: datos de la cotización a la izquierda, metadatos a la derecha
• Los datos del emisor aparecen en la columna izquierda
• En una cotización FACTURADA: aparece el link "Ver movimiento #ID" en la columna derecha
• Hacer clic en el link → navega a `/movimientos`
• El botón "Descargar PDF" está visible


5.6 Generación de PDF
• Ir al detalle de una cotización con datos completos (negocio con RFC/dirección/teléfono)
• Hacer clic en "Descargar PDF"
• El botón muestra "Generando PDF..." durante la generación
• Se descarga el archivo `cotizacion-COT-XXXX-NNN.pdf`
• Abrir el PDF y verificar:
- [ ] Header izquierdo: nombre del negocio, RFC, dirección, teléfono
- [ ] Header derecho: "COTIZACIÓN", folio, fecha en formato DD/MM/YYYY
- [ ] Si tiene número OC: aparece en el header derecho
- [ ] Si tiene número de factura: aparece en el header derecho
- [ ] Bloque de cliente: nombre (y RFC/dirección si existen)
- [ ] Tabla de ítems con columnas: # | Descripción | U.M. | Cantidad | P. Unitario | Importe
- [ ] Filas alternas con fondo suave
- [ ] Totales: subtotal, IVA 16%, total — verificar que los números cuadran matemáticamente
- [ ] Cláusulas en texto pequeño al pie
- [ ] Firma: "Sergio Daniel Madrid Salas"
• Probar con una cotización de negocio sin RFC → las líneas de RFC/dirección/teléfono no aparecen en el PDF (no dice "RFC: null")
• Intentar descargar el PDF sin sesión activa → 401 (no descarga)


